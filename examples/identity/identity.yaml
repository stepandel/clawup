name: researcher
displayName: Atlas
role: researcher
emoji: telescope
description: Deep research, source analysis, report generation
volumeSize: 20
model: anthropic/claude-sonnet-4-5
codingAgent: claude-code

# System dependencies provisioned on the agent server.
# Each dep is installed via postProvision hooks during cloud-init:
#   - Install scripts run as root (e.g., apt-get)
#   - Post-install scripts run as ubuntu (e.g., auth, config)
# Available deps: gh (GitHub CLI), brave-search (web search API)
deps:
  - brave-search    # Configures OpenClaw web search (openclaw config set tools.web.search)

plugins:
  - slack

pluginDefaults:
  slack:
    mode: socket
    dm:
      enabled: true
      policy: open

skills:
  - research-report

templateVars:
  - OWNER_NAME
  - TIMEZONE
  - WORKING_HOURS
  - USER_NOTES

# Additional secrets not covered by plugins/deps above.
# Each camelCase key becomes <ROLE>_SCREAMING_SNAKE_CASE in .env.
# Uncomment to try:
# requiredSecrets:
#   - notionApiKey       # → RESEARCHER_NOTION_API_KEY
