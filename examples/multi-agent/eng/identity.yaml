name: eng
displayName: Titus
role: eng
emoji: building_construction
description: Lead engineering, coding, shipping
volumeSize: 50
model: anthropic/claude-opus-4-6
codingAgent: claude-code

# System dependencies provisioned on the agent server.
# Install scripts run as root, post-install scripts run as ubuntu.
deps:
  - gh              # Installs GitHub CLI (apt-get) + authenticates with GITHUB_TOKEN
  - brave-search    # Configures OpenClaw web search with BRAVE_API_KEY

plugins:
  - openclaw-linear
  - slack

pluginDefaults:
  slack:
    mode: socket
    userTokenReadOnly: true
    groupPolicy: open
    dm:
      enabled: true
      policy: open
      allowFrom:
        - "*"

skills:
  - eng-queue-handler
  - eng-ticket-workflow
  - eng-pr-tester
  - pr-review-resolver

templateVars:
  - OWNER_NAME
  - TIMEZONE
  - WORKING_HOURS
  - USER_NOTES
  - LINEAR_TEAM
  - GITHUB_REPO
